# Pretraining schedule per Section 4.2.2 of DeepSeek_V4.pdf (V4-Flash settings)
_target_: saint_llm_training.config.TrainingConfig

total_tokens: 32_000_000_000_000  # 32T

# Optimizer
optimizer:
  muon:
    momentum: 0.95
    weight_decay: 0.1
    rms_rescale: 0.18
    newton_schulz_iters: 10
    newton_schulz_stage1_steps: 8
    newton_schulz_stage1_coeffs: [3.4445, -4.7750, 2.0315]
    newton_schulz_stage2_coeffs: [2.0, -1.5, 0.5]
  adamw:
    betas: [0.9, 0.95]
    eps: 1.0e-20
    weight_decay: 0.1

# LR schedule
lr:
  peak: 2.7e-4
  end: 2.7e-5
  warmup_steps: 2000
  decay: cosine

# Batch / sequence
batch:
  target_tokens: 75_500_000   # ramped up from a small initial size
  ramp_initial: 4_000_000
seq_len_schedule:
  - {tokens_until: dense_warmup, len: 4096}    # First 1T tokens, dense attention
  - {tokens_until: phase_a, len: 16384}
  - {tokens_until: phase_b, len: 65536}
  - {tokens_until: end, len: 1_048_576}        # 1M context

# Sparse attention warmup
sparse_attention:
  dense_warmup_tokens: 1_000_000_000_000  # 1T
  introduce_at_seq_len: 65536
  indexer_short_warmup_steps: 1000

# MoE
moe:
  aux_loss_free_bias_speed: 0.001
  sequence_balance_weight: 0.0001

# MTP
mtp:
  loss_weight_main: 0.3
  loss_weight_decay: 0.1   # switch to this at LR decay start

# Stability
stability:
  swiglu_clamp_linear: [-10.0, 10.0]
  swiglu_clamp_gate_max: 10.0
  anticipatory_routing_enabled: true
  anticipatory_routing_lag_steps: 1
