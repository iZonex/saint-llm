[project]
name = "saint-llm-training"
version = "0.0.1"
description = "Saint LLM training: loop, FP4 QAT, anticipatory routing, activation checkpointing"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "torch>=2.5",
    "hydra-core>=1.3",
    "omegaconf>=2.3",
    "pydantic>=2.9",
    "wandb>=0.18",
    "tqdm>=4.66",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saint_llm_training"]
