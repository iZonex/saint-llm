[project]
name = "saint-llm-inference"
version = "0.0.1"
description = "Saint LLM inference: heterogeneous KV cache + on-disk SWA caching"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "torch>=2.5",
    "pydantic>=2.9",
    "saint-llm-core",
]

[tool.uv.sources]
saint-llm-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saint_llm_inference"]
