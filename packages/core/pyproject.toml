[project]
name = "saint-llm-core"
version = "0.0.1"
description = "Saint LLM core: model architecture (CSA, HCA, mHC, MoE, MTP)"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "torch>=2.5",
    "einops>=0.8",
    "pydantic>=2.9",
    "saint-llm-kernels",
]

[tool.uv.sources]
saint-llm-kernels = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saint_llm_core"]
