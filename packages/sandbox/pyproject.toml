[project]
name = "saint-llm-sandbox"
version = "0.0.1"
description = "Saint LLM sandbox: libdsec Python SDK for DSec (Rust services in dsec/)"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "httpx>=0.27",
    "msgpack>=1.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saint_llm_sandbox"]
