[project]
name = "saint-llm-agents"
version = "0.0.1"
description = "Saint LLM multi-agent runtime: Agent, Policy, Tool registry, Runtime"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saint_llm_agents"]
