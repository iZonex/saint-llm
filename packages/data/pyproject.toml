[project]
name = "saint-llm-data"
version = "0.0.1"
description = "Saint LLM data: pretraining + post-training corpora, tokenizer"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "datatrove>=0.3",
    "datasets>=3.0",
    "tokenizers>=0.20",
    "pyarrow>=18",
    "pydantic>=2.9",
    "torch>=2.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saint_llm_data"]
