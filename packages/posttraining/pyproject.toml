[project]
name = "saint-llm-posttraining"
version = "0.0.1"
description = "Saint LLM post-training: specialist + GRPO + full-vocabulary OPD"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "torch>=2.5",
    "transformers>=4.45",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saint_llm_posttraining"]
